name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
      AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check version bump
        id: version
        run: |
          VERSION=$(bash packages/scripts/check-changeset.sh version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Tag ${TAG} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "📦 New version ${VERSION} — will create release ${TAG}."
          fi

      - name: Build, lint & test
        if: steps.version.outputs.exists != 'true'
        run: |
          pnpm build
          pnpm lint
          pnpm test

      - name: Package extensions
        if: steps.version.outputs.exists != 'true'
        run: |
          pnpm zip
          pnpm zip:firefox
          OUT=packages/extension/.output
          V="${{ steps.version.outputs.version }}"
          cp "${OUT}/ado-companion-extension-${V}-chrome.zip" "${OUT}/ado-companion-chrome.zip"
          cp "${OUT}/ado-companion-extension-${V}-firefox.zip" "${OUT}/ado-companion-firefox.zip"
          ls -la "${OUT}"/*.zip

      - name: Sign Firefox add-on (self-distribution)
        if: steps.version.outputs.exists != 'true' && env.AMO_JWT_ISSUER != ''
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          OUT=packages/extension/.output
          # Signs the built Firefox add-on via Mozilla AMO (unlisted) and writes
          # the signed .xpi into .output/. Requires the AMO_* repo secrets.
          pnpm --filter ado-companion-extension run sign:firefox
          XPI=$(ls "${OUT}"/*.xpi 2>/dev/null | head -1)
          if [[ -n "$XPI" ]]; then
            cp "$XPI" "${OUT}/ado-companion-firefox.xpi"
            echo "✅ Signed add-on: ${OUT}/ado-companion-firefox.xpi"
          else
            echo "::warning::web-ext sign produced no .xpi — falling back to the unsigned zip."
          fi

      - name: Extract changelog notes
        if: steps.version.outputs.exists != 'true'
        id: changelog
        run: |
          V="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## ${V}([^0-9]|\$)/{f=1;next} /^## /{if(f)exit} f" packages/extension/CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.version.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUT=packages/extension/.output
          V="${{ steps.version.outputs.version }}"
          # Prefer the signed .xpi (installs on release Firefox); fall back to the
          # unsigned zip when signing was skipped (no AMO secrets).
          ASSETS=("${OUT}/ado-companion-chrome.zip")
          if [[ -f "${OUT}/ado-companion-firefox.xpi" ]]; then
            ASSETS+=("${OUT}/ado-companion-firefox.xpi")
          else
            ASSETS+=("${OUT}/ado-companion-firefox.zip")
          fi
          gh release create "v${V}" "${ASSETS[@]}" \
            --title "ADO Companion v${V}" \
            --notes "${{ steps.changelog.outputs.notes }}"
